<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Carte Fournisseurs Île-de-France</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin:0; padding:15px; background:#f4f4f4; }
.header { background:white; padding:10px; border-radius:8px; margin-bottom:15px; }
#map { height:600px; border-radius:8px; }
.filters { background:white; padding:10px; margin-bottom:10px; display:flex; gap:10px; flex-wrap:wrap; }
select { padding:6px; }
</style>
</head>

<body>

<div class="header">
<h2>Carte Fournisseurs IDF</h2>
</div>

<div class="filters">
<select id="filtreVille" onchange="filtrer()"><option>Ville</option></select>
<select id="filtreNom" onchange="filtrer()"><option>Fournisseur</option></select>
<select id="filtreCP" onchange="filtrer()"><option>CP</option></select>
<select id="filtreProduit" onchange="filtrer()"><option>Produit</option></select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>

var map = L.map('map').setView([48.85,2.35],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];
let villesCoords={};
let villesExtra=new Set();

function norm(s){
return (s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}

/* 🟢 CHARGEMENT VILLES IDF */
function loadVilles(){
return fetch("villes_idf.csv",{cache:"no-store"})
.then(r=>r.text())
.then(csv=>{
Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:function(res){
res.data.forEach(r=>{
let v=r["Ville"]?.trim();
let lat=parseFloat((r["lat"]||"").replace(",","."));
let lng=parseFloat((r["long"]||"").replace(",","."));

if(v){
villesExtra.add(v);
if(!isNaN(lat)&&!isNaN(lng)){
villesCoords[norm(v)]=[lat,lng];
}
}
});
console.log("✔ Villes chargées:",villesExtra.size);
}
});
});
}

/* 🟢 CHARGEMENT FOURNISSEURS */
Promise.all([
fetch("data.csv").then(r=>r.text()),
loadVilles()
]).then(([csv])=>{

Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:function(res){

let villeSet=new Set();
let frsSet=new Set();
let cpSet=new Set();
let prodSet=new Set();

res.data.forEach(r=>{

let lat=parseFloat((r["latitude (fournisseur)"]||"").replace(",","."));
let lng=parseFloat((r["longitude (fournisseur)"]||"").replace(",","."));
if(isNaN(lat)) return;

let f=r["fournisseur"];
let v=r["ville"];
let cp=r["CP"];
let p=r["Produit"];

if(f) frsSet.add(f);
if(v) villeSet.add(v);
if(cp) cpSet.add(cp);
if(p) prodSet.add(p);

let m=L.marker([lat,lng]).addTo(map);
m.data={f,v,cp,p,lat,lng};
markers.push(m);
});

/* 🔥 FUSION VILLES SANS DOUBLONS */
let allVilles=new Set([...villeSet,...villesExtra]);

fill("filtreVille",allVilles);
fill("filtreNom",frsSet);
fill("filtreCP",cpSet);
fill("filtreProduit",prodSet);

}
});
});

/* 🟢 FILL SELECT */
function fill(id,set){
let s=document.getElementById(id);
s.innerHTML="<option value=''>Tous</option>";

Array.from(set).sort().forEach(v=>{
let o=document.createElement("option");
o.value=v;
o.textContent=v;
s.appendChild(o);
});
}

/* 🟢 FILTRE SIMPLE */
function filtrer(){
let ville=norm(document.getElementById("filtreVille").value);

markers.forEach(m=>{
if(!ville || norm(m.data.v)==ville){
m.addTo(map);
}else{
map.removeLayer(m);
}
});
}

</script>

</body>
</html>
